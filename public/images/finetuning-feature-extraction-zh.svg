<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 360" font-family="system-ui,-apple-system,sans-serif">
  <rect width="660" height="360" fill="white"/>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#374151"/>
    </marker>
    <marker id="darr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Titles -->
  <text x="160" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">源模型</text>
  <text x="490" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">目标模型</text>

  <!-- ── Source model layers ── -->
  <rect x="60" y="32" width="200" height="44" rx="6" fill="#60a5fa" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="59" text-anchor="middle" font-size="13" font-weight="600" fill="white">输出层</text>

  <rect x="60" y="90" width="200" height="44" rx="6" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="160" y="117" text-anchor="middle" font-size="13" fill="#1e3a8a">第 L-1 层</text>

  <text x="160" y="158" text-anchor="middle" font-size="20" fill="#6b7280">⋮</text>

  <rect x="60" y="168" width="200" height="44" rx="6" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="160" y="195" text-anchor="middle" font-size="13" fill="#1e3a8a">第 1 层</text>

  <!-- up arrow -->
  <line x1="160" y1="255" x2="160" y2="214" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- source dataset -->
  <rect x="80" y="260" width="160" height="38" rx="6" fill="white" stroke="#374151" stroke-width="1.5"/>
  <text x="160" y="284" text-anchor="middle" font-size="13" fill="#374151">源数据集</text>

  <!-- 预训练 bracket left -->
  <line x1="48" y1="32" x2="38" y2="32" stroke="#374151" stroke-width="1.5"/>
  <line x1="38" y1="32" x2="38" y2="260" stroke="#374151" stroke-width="1.5"/>
  <line x1="38" y1="260" x2="48" y2="260" stroke="#374151" stroke-width="1.5"/>
  <text x="12" y="155" text-anchor="middle" font-size="13" fill="#374151" transform="rotate(-90,12,155)">预训练</text>

  <!-- ── Dotted copy arrows ── -->
  <!-- output layer: 随机初始化 -->
  <line x1="262" y1="54" x2="388" y2="54" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#darr)"/>
  <text x="325" y="48" text-anchor="middle" font-size="11" fill="#374151">随机初始化</text>

  <!-- L-1 layer: 复制 -->
  <line x1="262" y1="112" x2="388" y2="112" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#darr)"/>
  <text x="325" y="106" text-anchor="middle" font-size="11" fill="#374151">复制</text>

  <!-- dots row -->
  <line x1="262" y1="158" x2="388" y2="158" stroke="#6b7280" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="325" y="153" text-anchor="middle" font-size="11" fill="#374151">复制</text>

  <!-- layer 1: 复制 -->
  <line x1="262" y1="190" x2="388" y2="190" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#darr)"/>
  <text x="325" y="184" text-anchor="middle" font-size="11" fill="#374151">复制</text>

  <!-- ── Target model layers ── -->
  <rect x="390" y="32" width="200" height="44" rx="6" fill="#1d4ed8" stroke="#1e40af" stroke-width="1.5"/>
  <text x="490" y="59" text-anchor="middle" font-size="13" font-weight="600" fill="white">输出层</text>

  <rect x="390" y="90" width="200" height="44" rx="6" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="490" y="117" text-anchor="middle" font-size="13" fill="#1e3a8a">第 L-1 层</text>

  <text x="490" y="158" text-anchor="middle" font-size="20" fill="#6b7280">⋮</text>

  <rect x="390" y="168" width="200" height="44" rx="6" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="490" y="195" text-anchor="middle" font-size="13" fill="#1e3a8a">第 1 层</text>

  <!-- up arrow -->
  <line x1="490" y1="255" x2="490" y2="214" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- target dataset -->
  <rect x="410" y="260" width="160" height="38" rx="6" fill="white" stroke="#374151" stroke-width="1.5"/>
  <text x="490" y="284" text-anchor="middle" font-size="13" fill="#374151">目标数据集</text>

  <!-- 从头训练 bracket right of output layer -->
  <line x1="602" y1="32" x2="612" y2="32" stroke="#374151" stroke-width="1.5"/>
  <line x1="612" y1="32" x2="612" y2="76" stroke="#374151" stroke-width="1.5"/>
  <line x1="612" y1="76" x2="602" y2="76" stroke="#374151" stroke-width="1.5"/>
  <text x="640" y="58" text-anchor="middle" font-size="12" fill="#374151">从头训练</text>

  <!-- 微调 bracket right of other layers -->
  <line x1="602" y1="90" x2="622" y2="90" stroke="#374151" stroke-width="1.5"/>
  <line x1="622" y1="90" x2="622" y2="260" stroke="#374151" stroke-width="1.5"/>
  <line x1="622" y1="260" x2="602" y2="260" stroke="#374151" stroke-width="1.5"/>
  <text x="648" y="180" text-anchor="middle" font-size="12" fill="#374151">微调</text>
</svg>
