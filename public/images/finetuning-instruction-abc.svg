<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="system-ui,-apple-system,sans-serif">
  <rect width="820" height="340" fill="white"/>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- ── Panel A ── -->
  <rect x="10" y="10" width="245" height="155" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="132" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">(A) Pretrain–Finetune</text>

  <rect x="28" y="44" width="92" height="36" rx="6" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="74" y="67" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Pretrained LM</text>

  <line x1="120" y1="62" x2="148" y2="62" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="150" y="44" width="92" height="36" rx="6" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5"/>
  <text x="196" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="white">Finetune</text>
  <text x="196" y="76" text-anchor="middle" font-size="10" fill="white">on task A</text>

  <line x1="196" y1="80" x2="196" y2="100" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="150" y="102" width="92" height="36" rx="6" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="196" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Inference</text>
  <text x="196" y="134" text-anchor="middle" font-size="10" fill="#1e40af">on task A</text>

  <text x="132" y="157" text-anchor="middle" font-size="10" fill="#16a34a">Requires large per-task labeled dataset</text>

  <!-- ── Panel B ── -->
  <rect x="10" y="178" width="245" height="150" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="132" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">(B) Prompting</text>

  <rect x="28" y="212" width="92" height="36" rx="6" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="74" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Pretrained LM</text>

  <line x1="120" y1="230" x2="148" y2="230" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="150" y="212" width="92" height="36" rx="6" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="196" y="230" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Inference</text>
  <text x="196" y="244" text-anchor="middle" font-size="10" fill="#1e40af">on task A</text>

  <text x="132" y="278" text-anchor="middle" font-size="10" fill="#16a34a">No training needed.</text>
  <text x="132" y="292" text-anchor="middle" font-size="10" fill="#16a34a">Uses few-shot prompting</text>
  <text x="132" y="306" text-anchor="middle" font-size="10" fill="#16a34a">or prompt engineering</text>

  <!-- ── Panel C ── -->
  <rect x="268" y="10" width="540" height="320" rx="10" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="538" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">(C) Instruction Tuning</text>

  <rect x="285" y="46" width="110" height="36" rx="6" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="340" y="69" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Pretrained LM</text>

  <line x1="395" y1="64" x2="425" y2="64" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="427" y="46" width="160" height="36" rx="6" fill="#a855f7" stroke="#9333ea" stroke-width="1.5"/>
  <text x="507" y="64" text-anchor="middle" font-size="11" font-weight="600" fill="white">Instruction-tune</text>
  <text x="507" y="78" text-anchor="middle" font-size="10" fill="white">on tasks B, C, D …</text>

  <line x1="507" y1="82" x2="507" y2="102" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="427" y="104" width="160" height="36" rx="6" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="507" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Inference on</text>
  <text x="507" y="136" text-anchor="middle" font-size="10" fill="#1e40af">unseen task A</text>

  <!-- Example tasks below -->
  <text x="538" y="168" text-anchor="middle" font-size="11" fill="#7c3aed">Training tasks (with instructions):</text>

  <rect x="285" y="178" width="100" height="32" rx="5" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="335" y="199" text-anchor="middle" font-size="10" fill="#7c3aed">Translation</text>

  <rect x="395" y="178" width="100" height="32" rx="5" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="445" y="199" text-anchor="middle" font-size="10" fill="#7c3aed">Summarization</text>

  <rect x="505" y="178" width="100" height="32" rx="5" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="555" y="199" text-anchor="middle" font-size="10" fill="#7c3aed">Sentiment</text>

  <rect x="615" y="178" width="100" height="32" rx="5" fill="#f3e8ff" stroke="#c084fc" stroke-width="1"/>
  <text x="665" y="199" text-anchor="middle" font-size="10" fill="#7c3aed">QA</text>

  <text x="538" y="240" text-anchor="middle" font-size="11" fill="#6b7280">→ Model learns to follow natural language instructions</text>
  <text x="538" y="258" text-anchor="middle" font-size="11" fill="#6b7280">→ Generalizes to unseen tasks at inference</text>

  <text x="538" y="295" text-anchor="middle" font-size="10" fill="#7c3aed">Model learns to perform many tasks via</text>
  <text x="538" y="311" text-anchor="middle" font-size="10" fill="#7c3aed">natural language instructions</text>
</svg>
