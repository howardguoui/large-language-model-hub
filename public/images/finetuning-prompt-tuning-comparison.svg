<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" font-family="system-ui,-apple-system,sans-serif">
  <rect width="780" height="360" fill="white"/>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- ── Panel (a): Prompt Tuning / P-tuning ── -->
  <rect x="10" y="10" width="370" height="335" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="195" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">(a)  Prompt Tuning / P-tuning</text>

  <!-- Verbalizer / LM head at top -->
  <rect x="100" y="48" width="190" height="36" rx="6" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="195" y="71" text-anchor="middle" font-size="12" fill="#92400e">Verbalizer (LM Head)</text>

  <!-- Transformer -->
  <rect x="60" y="98" width="270" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="195" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">Transformers (frozen)</text>

  <line x1="195" y1="84" x2="195" y2="98" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Token embeddings row -->
  <text x="195" y="168" text-anchor="middle" font-size="11" fill="#374151">Token embeddings:</text>

  <rect x="30" y="178" width="46" height="30" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="53" y="198" text-anchor="middle" font-size="10" fill="#0369a1">e([CLS])</text>
  <rect x="82" y="178" width="46" height="30" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="105" y="198" text-anchor="middle" font-size="10" fill="#0369a1">e(w₁)</text>
  <rect x="134" y="178" width="46" height="30" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="157" y="198" text-anchor="middle" font-size="10" fill="#0369a1">e(w₂)</text>

  <!-- Soft prompt tokens (orange) -->
  <rect x="186" y="178" width="46" height="30" rx="4" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="209" y="198" text-anchor="middle" font-size="10" fill="#9a3412">h₁</text>
  <rect x="238" y="178" width="46" height="30" rx="4" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="261" y="198" text-anchor="middle" font-size="10" fill="#9a3412">...</text>
  <rect x="290" y="178" width="46" height="30" rx="4" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="313" y="198" text-anchor="middle" font-size="10" fill="#9a3412">hᵢ</text>

  <!-- [MASK] -->
  <rect x="342" y="178" width="46" height="30" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="365" y="193" text-anchor="middle" font-size="9" fill="#0369a1">e([MASK])</text>

  <line x1="195" y1="162" x2="195" y2="148" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Prompt encoder -->
  <rect x="130" y="230" width="130" height="36" rx="6" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="195" y="248" text-anchor="middle" font-size="11" fill="#92400e">Prompt Encoder</text>
  <text x="195" y="262" text-anchor="middle" font-size="10" fill="#92400e">(optional)</text>

  <text x="195" y="305" text-anchor="middle" font-size="11" fill="#ea580c">Soft prompts prepended to input</text>
  <text x="195" y="320" text-anchor="middle" font-size="11" fill="#ea580c">only at the first layer</text>

  <!-- ── Panel (b): P-tuning v2 ── -->
  <rect x="400" y="10" width="370" height="335" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="585" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">(b)  P-tuning v2</text>

  <!-- Class label at top -->
  <rect x="490" y="48" width="190" height="36" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.5"/>
  <text x="585" y="71" text-anchor="middle" font-size="12" fill="#15803d">Class Label (Linear Head)</text>

  <!-- Transformer layers with per-layer prompts -->
  <rect x="450" y="98" width="160" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="530" y="121" text-anchor="middle" font-size="12" fill="#1d4ed8">Layer N</text>
  <rect x="630" y="98" width="120" height="36" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="690" y="121" text-anchor="middle" font-size="11" fill="#9a3412">Prompts Lᴺ</text>

  <line x1="530" y1="144" x2="530" y2="156" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="450" y="158" width="160" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="530" y="181" text-anchor="middle" font-size="12" fill="#1d4ed8">Layer 2</text>
  <rect x="630" y="158" width="120" height="36" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="690" y="181" text-anchor="middle" font-size="11" fill="#9a3412">Prompts L²</text>

  <line x1="530" y1="204" x2="530" y2="216" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="450" y="218" width="160" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="530" y="241" text-anchor="middle" font-size="12" fill="#1d4ed8">Layer 1</text>
  <rect x="630" y="218" width="120" height="36" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="690" y="241" text-anchor="middle" font-size="11" fill="#9a3412">Prompts L¹</text>

  <!-- Reparameterization -->
  <rect x="465" y="278" width="130" height="30" rx="5" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="530" y="298" text-anchor="middle" font-size="10" fill="#92400e">Reparameterization (Opt.)</text>

  <line x1="585" y1="84" x2="585" y2="98" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="585" y="325" text-anchor="middle" font-size="11" fill="#ea580c">Soft prompts injected at</text>
  <text x="585" y="339" text-anchor="middle" font-size="11" fill="#ea580c">every Transformer layer</text>
</svg>
