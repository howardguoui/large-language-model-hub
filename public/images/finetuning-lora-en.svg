<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="system-ui,-apple-system,sans-serif">
  <rect width="560" height="380" fill="#f8fafc" rx="14"/>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#6b7280"/>
    </marker>
    <marker id="ab" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#3b82f6"/>
    </marker>
    <marker id="ao" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- Output h -->
  <text x="280" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#1e40af">h</text>

  <!-- Sum node -->
  <circle cx="280" cy="60" r="16" fill="white" stroke="#6b7280" stroke-width="2"/>
  <text x="280" y="66" text-anchor="middle" font-size="18" fill="#374151">+</text>

  <line x1="280" y1="44" x2="280" y2="32" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- W box -->
  <rect x="40" y="105" width="185" height="175" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="132" y="165" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Pre-trained</text>
  <text x="132" y="185" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Weights W₀</text>
  <text x="132" y="210" text-anchor="middle" font-size="12" fill="#3b82f6">W ∈ ℝ^(d×k)</text>
  <rect x="70" y="228" width="124" height="26" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="132" y="246" text-anchor="middle" font-size="11" fill="#1e40af">🔒 Frozen (no grad)</text>

  <line x1="132" y1="348" x2="132" y2="282" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="132" y1="105" x2="132" y2="80" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="132" y1="80" x2="264" y2="80" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="264" y1="80" x2="264" y2="76" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- A box -->
  <rect x="340" y="240" width="175" height="65" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="427" y="266" text-anchor="middle" font-size="13" font-weight="700" fill="#ea580c">A  ∈ ℝ^(r×k)</text>
  <text x="427" y="285" text-anchor="middle" font-size="11" fill="#9a3412">Random Gaussian init</text>

  <line x1="427" y1="348" x2="427" y2="307" stroke="#ea580c" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="427" y="228" text-anchor="middle" font-size="12" fill="#9a3412" font-style="italic">r ≪ min(d, k)</text>
  <line x1="427" y1="240" x2="427" y2="195" stroke="#ea580c" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- B box -->
  <rect x="340" y="115" width="175" height="65" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="427" y="141" text-anchor="middle" font-size="13" font-weight="700" fill="#ea580c">B  ∈ ℝ^(d×r)</text>
  <text x="427" y="160" text-anchor="middle" font-size="11" fill="#9a3412">Zero init</text>

  <text x="468" y="103" font-size="11" fill="#9a3412">×α/r</text>

  <line x1="427" y1="115" x2="427" y2="80" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="427" y1="80" x2="296" y2="80" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="296" y1="80" x2="296" y2="76" stroke="#ea580c" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- Input x -->
  <text x="280" y="370" text-anchor="middle" font-size="20" font-weight="700" fill="#1e40af">x</text>
  <line x1="280" y1="356" x2="280" y2="348" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="132" y1="348" x2="427" y2="348" stroke="#6b7280" stroke-width="1.5"/>

  <text x="280" y="400" text-anchor="middle" font-size="12" fill="#6b7280">h = W₀x + BAx  (ΔW = BA, merged at inference — zero extra latency)</text>
</svg>
