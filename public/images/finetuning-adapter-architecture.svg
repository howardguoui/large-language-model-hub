<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="system-ui,-apple-system,sans-serif">
  <rect width="680" height="440" fill="white"/>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- ── LEFT PANEL: Transformer Layer with Adapters ── -->
  <text x="180" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Transformer Layer</text>

  <!-- Outer box -->
  <rect x="30" y="35" width="300" height="370" rx="10" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Layer Norm (top) -->
  <rect x="70" y="50" width="220" height="38" rx="6" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="180" y="74" text-anchor="middle" font-size="13" fill="#0369a1">Layer Norm</text>

  <!-- Feed-forward x2 -->
  <rect x="70" y="102" width="220" height="38" rx="6" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="180" y="126" text-anchor="middle" font-size="13" fill="#0369a1">Feed-forward × 2</text>

  <!-- Adapter (top) with residual -->
  <rect x="70" y="154" width="220" height="38" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="180" y="178" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">Adapter</text>
  <!-- residual + -->
  <circle cx="315" cy="173" r="12" fill="white" stroke="#6b7280" stroke-width="1.5"/>
  <text x="315" y="178" text-anchor="middle" font-size="14" fill="#374151">+</text>
  <line x1="290" y1="173" x2="303" y2="173" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="315" y1="154" x2="315" y2="100" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="315" y1="100" x2="292" y2="100" stroke="#6b7280" stroke-width="1" marker-end="url(#a)"/>

  <!-- Layer Norm (middle) -->
  <rect x="70" y="206" width="220" height="38" rx="6" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="180" y="230" text-anchor="middle" font-size="13" fill="#0369a1">Layer Norm</text>

  <!-- Multi-headed Attention -->
  <rect x="70" y="258" width="220" height="38" rx="6" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="180" y="282" text-anchor="middle" font-size="13" fill="#0369a1">Multi-headed Attention</text>

  <!-- Adapter (bottom) with residual -->
  <rect x="70" y="310" width="220" height="38" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="180" y="334" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">Adapter</text>
  <!-- residual + -->
  <circle cx="315" cy="329" r="12" fill="white" stroke="#6b7280" stroke-width="1.5"/>
  <text x="315" y="334" text-anchor="middle" font-size="14" fill="#374151">+</text>
  <line x1="290" y1="329" x2="303" y2="329" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="315" y1="310" x2="315" y2="258" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="315" y1="258" x2="292" y2="258" stroke="#6b7280" stroke-width="1" marker-end="url(#a)"/>

  <!-- Vertical arrows through left panel -->
  <line x1="180" y1="35" x2="180" y2="50" stroke="#374151" stroke-width="0"/>
  <line x1="180" y1="140" x2="180" y2="154" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="180" y1="192" x2="180" y2="206" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="180" y1="244" x2="180" y2="258" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="180" y1="296" x2="180" y2="310" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- bottom in -->
  <line x1="180" y1="365" x2="180" y2="395" stroke="#374151" stroke-width="1.5"/>
  <text x="180" y="410" text-anchor="middle" font-size="12" fill="#374151">输入</text>
  <!-- top out -->
  <line x1="180" y1="35" x2="180" y2="25" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── RIGHT PANEL: Adapter internal structure ── -->
  <text x="530" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Adapter Layer</text>

  <!-- input circles -->
  <circle cx="500" cy="405" r="8" fill="none" stroke="#374151" stroke-width="1.5"/>
  <circle cx="530" cy="405" r="8" fill="none" stroke="#374151" stroke-width="1.5"/>
  <circle cx="560" cy="405" r="8" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="530" y="424" text-anchor="middle" font-size="11" fill="#6b7280">输入</text>

  <!-- down-project -->
  <rect x="430" y="330" width="200" height="46" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="530" y="358" text-anchor="middle" font-size="13" fill="#15803d">Feedforward down-project</text>
  <line x1="530" y1="397" x2="530" y2="378" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- nonlinearity -->
  <rect x="430" y="262" width="200" height="46" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="530" y="290" text-anchor="middle" font-size="13" fill="#15803d">Nonlinearity</text>
  <line x1="530" y1="330" x2="530" y2="310" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- up-project -->
  <rect x="430" y="194" width="200" height="46" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
  <text x="530" y="222" text-anchor="middle" font-size="13" fill="#15803d">Feedforward up-project</text>
  <line x1="530" y1="262" x2="530" y2="242" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- residual + -->
  <circle cx="530" cy="158" r="16" fill="white" stroke="#6b7280" stroke-width="1.5"/>
  <text x="530" y="164" text-anchor="middle" font-size="16" fill="#374151">+</text>
  <line x1="530" y1="194" x2="530" y2="176" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- residual skip from input -->
  <line x1="640" y1="405" x2="640" y2="158" stroke="#374151" stroke-width="1.5"/>
  <line x1="640" y1="158" x2="548" y2="158" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="560" y1="397" x2="640" y2="397" stroke="#374151" stroke-width="1.5"/>
  <line x1="640" y1="397" x2="640" y2="405" stroke="#374151" stroke-width="0"/>

  <!-- output circles -->
  <circle cx="500" cy="110" r="8" fill="none" stroke="#374151" stroke-width="1.5"/>
  <circle cx="530" cy="110" r="8" fill="none" stroke="#374151" stroke-width="1.5"/>
  <circle cx="560" cy="110" r="8" fill="none" stroke="#374151" stroke-width="1.5"/>
  <text x="530" y="100" text-anchor="middle" font-size="11" fill="#6b7280">输出</text>
  <line x1="530" y1="142" x2="530" y2="120" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
</svg>
