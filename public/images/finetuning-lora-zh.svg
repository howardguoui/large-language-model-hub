<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="system-ui,-apple-system,sans-serif">
  <rect width="520" height="400" fill="white"/>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Output h -->
  <rect x="190" y="18" width="140" height="36" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="260" y="41" text-anchor="middle" font-size="16" font-weight="700" fill="#713f12">h</text>

  <!-- Sum node -->
  <circle cx="260" cy="82" r="16" fill="white" stroke="#6b7280" stroke-width="2"/>
  <text x="260" y="88" text-anchor="middle" font-size="16" fill="#374151">+</text>
  <line x1="260" y1="66" x2="260" y2="54" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── Left path: Pretrained W (blue square) ── -->
  <rect x="40" y="110" width="160" height="160" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="175" text-anchor="middle" font-size="12" fill="#1e40af">Pretrained Weights</text>
  <text x="120" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">W ∈ ℝ^(d×d)</text>
  <text x="120" y="218" text-anchor="middle" font-size="11" fill="#3b82f6">（冻结）</text>

  <!-- d annotation at bottom of W -->
  <line x1="40" y1="280" x2="200" y2="280" stroke="#374151" stroke-width="1"/>
  <text x="120" y="295" text-anchor="middle" font-size="11" fill="#374151">d</text>

  <!-- left path arrows: x→W and W→sum -->
  <line x1="120" y1="360" x2="120" y2="272" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="120" y1="110" x2="120" y2="82" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="120" y1="82" x2="244" y2="82" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── Right path: A (bottom trapezoid) ── -->
  <!-- A trapezoid: wide at bottom (d), narrow at top (r) -->
  <polygon points="340,275 460,275 430,220 370,220" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
  <text x="400" y="255" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">A ∈ ℝ^(r×d)</text>
  <text x="400" y="272" text-anchor="middle" font-size="10" fill="#9a3412">A = N(0, σ²)</text>

  <!-- r label between A and B -->
  <text x="400" y="212" text-anchor="middle" font-size="11" fill="#9a3412" font-style="italic">r</text>

  <!-- B trapezoid: narrow at bottom (r), wide at top (d) -->
  <polygon points="370,200 430,200 460,140 340,140" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
  <text x="400" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">B ∈ ℝ^(d×r)</text>
  <text x="400" y="192" text-anchor="middle" font-size="10" fill="#9a3412">B = 0</text>

  <!-- α/r scaling -->
  <text x="474" y="128" font-size="11" fill="#9a3412">×α/r</text>

  <!-- right path arrows: x→A, A→B, B→sum -->
  <line x1="400" y1="360" x2="400" y2="277" stroke="#ea580c" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="400" y1="140" x2="400" y2="98" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="400" y1="98" x2="276" y2="98" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="276" y1="98" x2="276" y2="94" stroke="#ea580c" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- d annotation (width of x) -->
  <line x1="120" y1="372" x2="400" y2="372" stroke="#374151" stroke-width="1"/>
  <text x="260" y="387" text-anchor="middle" font-size="11" fill="#374151">d</text>

  <!-- Input x -->
  <rect x="190" y="348" width="140" height="36" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="260" y="371" text-anchor="middle" font-size="16" font-weight="700" fill="#713f12">x</text>

  <!-- x splits to both paths -->
  <line x1="190" y1="366" x2="120" y2="366" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="120" y1="360" x2="120" y2="366" stroke="#6b7280" stroke-width="0"/>
  <line x1="330" y1="366" x2="400" y2="366" stroke="#ea580c" stroke-width="1.5"/>
</svg>
